<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addo Spar - PV Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .last-updated {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-value.ok { color: #22c55e; }
        .stat-value.low { color: #fb923c; }
        .stat-value.offline { color: #ef4444; }

        .stat-sublabel {
            color: #64748b;
            font-size: 0.8rem;
        }

        .chart-section {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .chart-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toggle-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.5);
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .toggle-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #60a5fa;
        }

        .toggle-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }

        .chart-container {
            position: relative;
            height: 400px;
        }

        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.3rem;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .chart-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="siteName">Addo Spar</h1>
            <div class="last-updated" id="lastUpdated">Updated: Loading...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Generation Today</div>
                <div class="stat-value" id="totalKwh">-- kWh</div>
                <div class="stat-sublabel" id="statusLabel">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">30-Day Daily Average</div>
                <div class="stat-value" id="avgKwh">-- kWh</div>
                <div class="stat-sublabel">Typical day performance</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Hour Updated</div>
                <div class="stat-value" id="lastHour">--:00</div>
                <div class="stat-sublabel" id="lastHourKwh">-- kW generated</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="status">--</div>
                <div class="stat-sublabel" id="statusDetail">--</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">Hourly Generation</div>
                <div class="chart-controls">
                    <button class="toggle-btn active" onclick="switchChartMode('today')">Today</button>
                    <button class="toggle-btn" onclick="switchChartMode('average')">30-Day Average</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div id="dataLoading" class="loading">Loading data...</div>
    </div>

    <script>
        // Configuration - CHANGE THESE FOR EACH SITE
        const SITE_CONFIG = {
            name: "Addo Spar",
            dataUrl: "./data/processed.json"
        };

        let dashboardData = null;
        let hourlyChart = null;
        let currentChartMode = 'today';

        // Load data on page load
        loadData();
        
        // Auto-refresh every hour
        setInterval(loadData, 3600000);

        async function loadData() {
            try {
                const response = await fetch(SITE_CONFIG.dataUrl);
                if (!response.ok) throw new Error('Failed to fetch data');
                
                dashboardData = await response.json();
                document.getElementById('dataLoading').style.display = 'none';
                updateDashboard();
                updateChart();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('dataLoading').innerHTML = 
                    `<div style="color: #ef4444;">Error loading data: ${error.message}</div>`;
            }
        }

        function updateDashboard() {
            const stats = dashboardData.stats_30day || {};
            
            // Update header
            document.getElementById('siteName').textContent = SITE_CONFIG.name;
            document.getElementById('lastUpdated').textContent = 
                `Updated ${dashboardData.last_updated || 'N/A'}`;

            // Update stats cards
            const totalKwh = dashboardData.total_kwh || 0;
            const avgKwh = stats.daily_avg || 0;
            const status = dashboardData.status || 'offline';
            
            document.getElementById('totalKwh').textContent = totalKwh.toFixed(1) + ' kWh';
            document.getElementById('totalKwh').className = `stat-value ${status}`;
            
            document.getElementById('avgKwh').textContent = avgKwh.toFixed(1) + ' kWh';
            
            const lastHour = dashboardData.last_hour || '--';
            const hourlyPv = dashboardData.hourly_pv || [];
            const lastHourValue = lastHour !== '--' ? (hourlyPv[parseInt(lastHour)] || 0) : 0;
            
            document.getElementById('lastHour').textContent = lastHour + ':00';
            document.getElementById('lastHourKwh').textContent = lastHourValue.toFixed(1) + ' kW generated';

            // Status
            const statusText = status.toUpperCase();
            document.getElementById('status').textContent = statusText;
            document.getElementById('status').className = `stat-value ${status}`;
            
            const percentOfAvg = avgKwh > 0 ? ((totalKwh / avgKwh) * 100).toFixed(0) : 0;
            document.getElementById('statusLabel').textContent = 
                `${percentOfAvg}% of daily average`;
            
            if (status === 'ok') {
                document.getElementById('statusDetail').textContent = 'Generating normally';
            } else if (status === 'low') {
                document.getElementById('statusDetail').textContent = 'Below expected generation';
            } else {
                document.getElementById('statusDetail').textContent = 'No recent data';
            }
        }

        function updateChart() {
            const hours = Array.from({length: 24}, (_, i) => i);
            const hourlyPv = dashboardData.hourly_pv || new Array(24).fill(0);
            const irradiation = dashboardData.irradiation || new Array(24).fill(0);
            const stats = dashboardData.stats_30day || {};
            
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            if (hourlyChart) {
                hourlyChart.destroy();
            }

            const chartData = currentChartMode === 'today' ? {
                labels: hours.map(h => `${h}:00`),
                datasets: [
                    {
                        label: 'Irradiation',
                        data: irradiation,
                        backgroundColor: 'rgba(251, 191, 36, 0.2)',
                        borderColor: 'rgba(251, 191, 36, 0.5)',
                        borderWidth: 1,
                        fill: true,
                        yAxisID: 'y1',
                        pointRadius: 0,
                        order: 3
                    },
                    {
                        label: '30-Day Average',
                        data: stats.hourly_avg || new Array(24).fill(0),
                        borderColor: '#60a5fa',
                        borderWidth: 2,
                        borderDash: [5, 3],
                        fill: false,
                        pointRadius: 0,
                        order: 2
                    },
                    {
                        label: 'Today PV',
                        data: hourlyPv,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        pointRadius: 0,
                        order: 1
                    }
                ]
            } : {
                labels: hours.map(h => `${h}:00`),
                datasets: [
                    {
                        label: 'Min-Max Range',
                        data: stats.hourly_min || new Array(24).fill(0),
                        backgroundColor: 'rgba(156, 163, 175, 0.1)',
                        borderColor: 'rgba(156, 163, 175, 0.4)',
                        borderWidth: 1,
                        borderDash: [5, 5],
                        fill: '+1',
                        pointRadius: 0,
                        order: 5
                    },
                    {
                        label: '',
                        data: stats.hourly_max || new Array(24).fill(0),
                        backgroundColor: 'transparent',
                        borderColor: 'rgba(156, 163, 175, 0.4)',
                        borderWidth: 1,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        order: 5
                    },
                    {
                        label: 'P10-P90',
                        data: stats.hourly_p10 || new Array(24).fill(0),
                        backgroundColor: 'rgba(156, 163, 175, 0.15)',
                        borderColor: 'rgba(156, 163, 175, 0.5)',
                        borderWidth: 1,
                        borderDash: [3, 3],
                        fill: '+1',
                        pointRadius: 0,
                        order: 4
                    },
                    {
                        label: '',
                        data: stats.hourly_p90 || new Array(24).fill(0),
                        backgroundColor: 'transparent',
                        borderColor: 'rgba(156, 163, 175, 0.5)',
                        borderWidth: 1,
                        borderDash: [3, 3],
                        pointRadius: 0,
                        order: 4
                    },
                    {
                        label: 'P25-P75',
                        data: stats.hourly_p25 || new Array(24).fill(0),
                        backgroundColor: 'rgba(34, 197, 94, 0.2)',
                        borderColor: 'rgba(34, 197, 94, 0.6)',
                        borderWidth: 2,
                        fill: '+1',
                        pointRadius: 0,
                        order: 3
                    },
                    {
                        label: '',
                        data: stats.hourly_p75 || new Array(24).fill(0),
                        backgroundColor: 'transparent',
                        borderColor: 'rgba(34, 197, 94, 0.6)',
                        borderWidth: 2,
                        pointRadius: 0,
                        order: 3
                    },
                    {
                        label: 'Median (P50)',
                        data: stats.hourly_avg || new Array(24).fill(0),
                        borderColor: '#22c55e',
                        borderWidth: 3,
                        borderDash: [8, 4],
                        fill: false,
                        pointRadius: 0,
                        order: 1
                    }
                ]
            };

            hourlyChart = new Chart(ctx, {
                type: 'line',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#94a3b8',
                                font: { size: 11 },
                                usePointStyle: true,
                                filter: (item) => item.text !== ''
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleColor: '#e2e8f0',
                            bodyColor: '#cbd5e1',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label && label !== '') {
                                        label += ': ';
                                    }
                                    if (context.dataset.yAxisID === 'y1') {
                                        label += context.parsed.y.toFixed(0) + ' W/m²';
                                    } else {
                                        label += context.parsed.y.toFixed(1) + ' kW';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#64748b',
                                font: { size: 10 }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            position: 'left',
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#64748b',
                                font: { size: 10 },
                                callback: function(value) {
                                    return value.toFixed(0) + ' kW';
                                }
                            },
                            title: {
                                display: true,
                                text: 'PV Output (kW)',
                                color: '#94a3b8',
                                font: { size: 11 }
                            }
                        },
                        y1: currentChartMode === 'today' ? {
                            beginAtZero: true,
                            position: 'right',
                            grid: {
                                drawOnChartArea: false,
                            },
                            ticks: {
                                color: '#fbbf24',
                                font: { size: 10 },
                                callback: function(value) {
                                    return value.toFixed(0);
                                }
                            },
                            title: {
                                display: true,
                                text: 'Irradiation (W/m²)',
                                color: '#fbbf24',
                                font: { size: 11 }
                            }
                        } : undefined
                    }
                }
            });
        }

        function switchChartMode(mode) {
            currentChartMode = mode;
            
            // Update button states
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateChart();
        }
    </script>
</body>
</html>

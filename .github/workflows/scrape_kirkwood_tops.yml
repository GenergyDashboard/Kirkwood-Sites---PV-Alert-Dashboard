name: Scrape and Process Kirkwood Tops Data (Sunsynk)

on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run Sunsynk scraper
        env:
          SUNSYNK_USERNAME: ${{ secrets.SUNSYNK_USERNAME }}
          SUNSYNK_PASSWORD: ${{ secrets.SUNSYNK_PASSWORD }}
          PLANT_NAME: "kirkwood tops"
        run: |
          cd kirkwood-tops
          python download_sunsynk_kirkwood_tops.py

      - name: Run processor
        env:
          PLANT_NAME: "Kirkwood Tops"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd kirkwood-tops
          python process_sunsynk_kirkwood_tops.py

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add kirkwood-tops/data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Kirkwood Tops data - $(date +'%Y-%m-%d %H:%M SAST')" && git pull --rebase && git push)

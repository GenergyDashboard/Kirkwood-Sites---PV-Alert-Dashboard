name: Scrape and Process Kirkwood Spar Data

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl requests
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run scraper
        env:
          FUSIONSOLAR_USERNAME: ${{ secrets.FUSIONSOLAR_USERNAME }}
          FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
          PLANT_NAME: "Kirkwood Spar"
        run: |
          cd kirkwood-spar
          python download_plant_data_kirkwood_spar.py

      - name: Run processor
        env:
          PLANT_NAME: "Kirkwood Spar"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd kirkwood-spar
          python process_plant_data_kirkwood_spar.py

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add kirkwood-spar/data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Kirkwood Spar data - $(date +'%Y-%m-%d %H:%M SAST')" && git pull --rebase && git push)

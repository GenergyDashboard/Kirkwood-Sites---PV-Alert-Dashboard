<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirkwood Sites - PV Status Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1419;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
        }

        .last-updated {
            color: #64748b;
            font-size: 0.85rem;
        }

        .fleet-summary {
            background: linear-gradient(135deg, #1a2332 0%, #1e2936 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .fleet-total {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
            line-height: 1;
        }

        .fleet-label {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .fleet-status-bar {
            background: rgba(10, 15, 26, 0.6);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fleet-status-label {
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .fleet-status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 16px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .fleet-status-badge.has-issues {
            background: rgba(251, 146, 60, 0.15);
            border-color: rgba(251, 146, 60, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        .has-issues .status-dot {
            background: #fb923c;
            box-shadow: 0 0 8px #fb923c;
        }

        .status-count {
            color: #22c55e;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .has-issues .status-count {
            color: #fb923c;
        }

        .sites-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 30px;
        }

        .site-card {
            background: linear-gradient(135deg, #1a2332 0%, #1e2936 100%);
            border-radius: 14px;
            padding: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .site-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .site-info {
            padding: 18px 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
        }

        .site-left {
            display: flex;
            flex-direction: column;
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .site-name {
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .status-indicator.ok { background: #22c55e; color: #22c55e; }
        .status-indicator.low { background: #fb923c; color: #fb923c; }
        .status-indicator.offline { background: #ef4444; color: #ef4444; }

        .site-production {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            margin-bottom: 5px;
        }

        .site-status {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .site-status.ok { color: #22c55e; }
        .site-status.low { color: #fb923c; }
        .site-status.offline { color: #ef4444; }

        .site-chart-wrapper {
            width: 200px;
            height: 100px;
            position: relative;
        }

        .site-chart-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 22px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .footer-note {
            text-align: left;
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 15px;
            padding-left: 5px;
        }

        @media (max-width: 900px) {
            .sites-grid {
                grid-template-columns: 1fr;
            }
            .site-info {
                grid-template-columns: 1fr;
            }
            .site-chart-wrapper {
                width: 100%;
                height: 120px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kirkwood Sites - PV Status Dashboard</h1>
            <div class="last-updated" id="lastUpdated">Updated --:--</div>
        </div>

        <div class="fleet-summary">
            <div class="fleet-total" id="fleetTotal">0.0 <span style="font-size: 1.5rem; color: #9ca3af;">kWh</span></div>
            <div class="fleet-label">Total Generation Today</div>
            <div class="fleet-status-bar">
                <div class="fleet-status-label">Fleet Status</div>
                <div class="fleet-status-badge" id="statusBadge">
                    <div class="status-dot"></div>
                    <div class="status-count" id="statusCount">-- OK</div>
                </div>
            </div>
        </div>

        <div id="sitesContainer" class="sites-grid">
            <div class="loading">Loading site data...</div>
        </div>

        <div class="footer-note">Auto-refreshes every hour</div>

        <button class="refresh-btn" onclick="loadAllSites()">&#x1f504; Refresh</button>
    </div>

    <script>
        const kirkwoodSites = [
            {
                name: "Addo Spar",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/addo-spar/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/addo-spar/",
            },
            {
                name: "Kirkwood FNB",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-fnb/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-fnb/",
            },
            {
                name: "Kirkwood Spar",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-spar/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-spar/",
            },
            {
                name: "Kirkwood Tops",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-tops/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-tops/",
            }
        ];

        let allSitesData = [];
        let siteCharts = {};

        loadAllSites();
        setInterval(loadAllSites, 3600000);

        async function loadAllSites() {
            try {
                const promises = kirkwoodSites.map(async site => {
                    try {
                        const response = await fetch(site.dataUrl);
                        if (!response.ok) throw new Error('Failed to fetch');
                        const data = await response.json();
                        return { ...site, ...data, loaded: true };
                    } catch (error) {
                        console.error(`Error loading ${site.name}:`, error);
                        return {
                            ...site,
                            loaded: false,
                            status: 'offline',
                            total_kwh: 0,
                            last_updated: 'N/A',
                            today: { hourly_pv: new Array(24).fill(0), irradiation: new Array(24).fill(0) },
                            hourly_pv: new Array(24).fill(0),
                            stats_30day: {}
                        };
                    }
                });

                allSitesData = await Promise.all(promises);
                updateDashboard();
            } catch (error) {
                console.error('Error loading sites:', error);
            }
        }

        function getHourlyPv(site) {
            // Support both nested (today.hourly_pv) and flat (hourly_pv) formats
            if (site.today && site.today.hourly_pv) return site.today.hourly_pv;
            return site.hourly_pv || new Array(24).fill(0);
        }

        function updateDashboard() {
            const fleetTotal = allSitesData.reduce((sum, site) => sum + (site.total_kwh || 0), 0);
            const sitesOk = allSitesData.filter(s => s.status === 'ok').length;
            const sitesTotal = allSitesData.length;
            const hasIssues = sitesOk < sitesTotal;

            document.getElementById('fleetTotal').innerHTML = 
                `${fleetTotal.toFixed(1)} <span style="font-size: 1.5rem; color: #9ca3af;">kWh</span>`;
            
            const badge = document.getElementById('statusBadge');
            badge.className = `fleet-status-badge${hasIssues ? ' has-issues' : ''}`;
            document.getElementById('statusCount').textContent = `${sitesOk} OK`;

            const latestUpdate = allSitesData
                .filter(s => s.last_updated)
                .map(s => s.last_updated)
                .sort()
                .reverse()[0] || 'N/A';
            document.getElementById('lastUpdated').textContent = `Updated ${latestUpdate}`;

            const container = document.getElementById('sitesContainer');
            container.innerHTML = '';

            allSitesData.forEach(site => {
                const card = createSiteCard(site);
                container.appendChild(card);
            });

            setTimeout(() => {
                allSitesData.forEach(site => {
                    renderSiteChart(site);
                });
            }, 100);
        }

        function createSiteCard(site) {
            const card = document.createElement('div');
            card.className = `site-card ${site.status}`;
            card.onclick = () => window.open(site.dashboardUrl, '_blank');

            const chartId = `chart-${site.name.replace(/\s+/g, '-').toLowerCase()}`;

            card.innerHTML = `
                <div class="site-info">
                    <div class="site-left">
                        <div class="site-header">
                            <div class="site-name">${site.name}</div>
                            <div class="status-indicator ${site.status}"></div>
                        </div>
                        <div class="site-production">${(site.total_kwh || 0).toFixed(1)} <span style="font-size: 1rem; color: #9ca3af;">kWh</span></div>
                        <div class="site-status ${site.status}">System ${(site.status || 'offline').toUpperCase()}</div>
                    </div>
                    <div class="site-chart-wrapper">
                        <div class="site-chart-container">
                            <canvas id="${chartId}"></canvas>
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        function renderSiteChart(site) {
            const chartId = `chart-${site.name.replace(/\s+/g, '-').toLowerCase()}`;
            const canvas = document.getElementById(chartId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const hours = Array.from({length: 24}, (_, i) => i);
            const hourlyPv = getHourlyPv(site);
            const stats = site.stats_30day || {};

            if (siteCharts[chartId]) {
                siteCharts[chartId].destroy();
            }

            // Mini bar chart matching the full dashboard style
            siteCharts[chartId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours,
                    datasets: [
                        {
                            type: 'line',
                            label: 'Avg',
                            data: stats.hourly_avg || new Array(24).fill(0),
                            borderColor: 'rgba(156, 163, 184, 0.6)',
                            borderWidth: 1,
                            borderDash: [3, 2],
                            fill: false,
                            pointRadius: 0,
                            tension: 0.4,
                            order: 1
                        },
                        {
                            type: 'bar',
                            label: 'Today',
                            data: hourlyPv,
                            backgroundColor: '#22c55e',
                            borderWidth: 0,
                            barPercentage: 0.8,
                            categoryPercentage: 0.9,
                            order: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            enabled: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(148, 163, 184, 0.08)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#4b5563',
                                font: { size: 7 },
                                maxTicksLimit: 6
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(148, 163, 184, 0.08)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#4b5563',
                                font: { size: 7 },
                                maxTicksLimit: 4
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirkwood Sites - PV Status Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f1419;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
        }

        .last-updated {
            color: #64748b;
            font-size: 0.85rem;
        }

        .fleet-summary {
            background: linear-gradient(135deg, #1a2332 0%, #1e2936 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .fleet-total {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
            line-height: 1;
        }

        .fleet-label {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .fleet-status-bar {
            background: rgba(10, 15, 26, 0.6);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fleet-status-label {
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .fleet-status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 16px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .fleet-status-badge.has-issues {
            background: rgba(251, 146, 60, 0.15);
            border-color: rgba(251, 146, 60, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        .has-issues .status-dot {
            background: #fb923c;
            box-shadow: 0 0 8px #fb923c;
        }

        .status-count {
            color: #22c55e;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .has-issues .status-count {
            color: #fb923c;
        }

        /* ── Chart mode toggle ─────────────────────────────── */
        .chart-mode-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 18px;
        }

        .mode-btn {
            padding: 7px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 20, 25, 0.4);
            color: #9ca3af;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.25s;
        }

        .mode-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #60a5fa;
        }

        .mode-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }

        .sites-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 30px;
        }

        .site-card {
            background: linear-gradient(135deg, #1a2332 0%, #1e2936 100%);
            border-radius: 14px;
            padding: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .site-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .site-info {
            padding: 16px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .site-left {
            display: flex;
            flex-direction: column;
        }

        .site-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .site-name {
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .status-indicator.ok { background: #22c55e; color: #22c55e; }
        .status-indicator.low { background: #fb923c; color: #fb923c; }
        .status-indicator.offline { background: #ef4444; color: #ef4444; }

        .site-production {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            margin-bottom: 4px;
        }

        .site-status {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .site-status.ok { color: #22c55e; }
        .site-status.low { color: #fb923c; }
        .site-status.offline { color: #ef4444; }

        .site-stats-row {
            display: flex;
            gap: 12px;
            padding: 0 20px 6px;
        }

        .site-stat-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            color: #9ca3af;
        }

        .site-stat-badge.good { color: #22c55e; }
        .site-stat-badge.warn { color: #fb923c; }
        .site-stat-badge.bad { color: #ef4444; }

        .mini-legend {
            display: flex;
            gap: 8px;
            padding: 2px 14px 4px;
            flex-wrap: wrap;
        }

        .mini-legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.65rem;
            color: #6b7280;
        }

        .mini-legend-swatch {
            width: 14px;
            height: 4px;
            border-radius: 1px;
        }

        .site-chart-wrapper {
            width: 100%;
            height: 150px;
            position: relative;
            padding: 0 12px 12px;
        }

        .site-chart-container {
            position: absolute;
            top: 0;
            left: 12px;
            right: 12px;
            bottom: 12px;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 22px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .footer-note {
            text-align: left;
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 15px;
            padding-left: 5px;
        }

        @media (max-width: 900px) {
            .sites-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kirkwood Sites - PV Status Dashboard</h1>
            <div class="last-updated" id="lastUpdated">Updated --:--</div>
        </div>

        <div class="fleet-summary">
            <div class="fleet-total" id="fleetTotal">0.0 <span style="font-size: 1.5rem; color: #9ca3af;">kWh</span></div>
            <div class="fleet-label">Total Generation Today</div>
            <div class="fleet-status-bar">
                <div class="fleet-status-label">Fleet Status</div>
                <div class="fleet-status-badge" id="statusBadge">
                    <div class="status-dot"></div>
                    <div class="status-count" id="statusCount">-- OK</div>
                </div>
            </div>
        </div>

        <div class="chart-mode-bar">
            <button class="mode-btn active" onclick="switchMiniMode('today', this)">Today</button>
            <button class="mode-btn" onclick="switchMiniMode('average', this)">30-Day Average</button>
        </div>

        <div id="sitesContainer" class="sites-grid">
            <div class="loading">Loading site data...</div>
        </div>

        <div class="footer-note">Auto-refreshes every hour</div>

        <button class="refresh-btn" onclick="loadAllSites()">&#x1f504; Refresh</button>
    </div>

    <script>
        const kirkwoodSites = [
            {
                name: "Addo Spar",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/addo-spar/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/addo-spar/",
            },
            {
                name: "Kirkwood FNB",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-fnb/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-fnb/",
            },
            {
                name: "Kirkwood Spar",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-spar/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-spar/",
            },
            {
                name: "Kirkwood Tops",
                dataUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-tops/data/processed.json",
                dashboardUrl: "/Kirkwood-Sites---PV-Alert-Dashboard/kirkwood-tops/",
            }
        ];

        let allSitesData = [];
        let siteCharts = {};
        let currentMiniMode = 'today';

        // Crisp rendering on high-DPI and zoom
        Chart.defaults.devicePixelRatio = window.devicePixelRatio * 2 || 2;

        loadAllSites();
        setInterval(loadAllSites, 3600000);

        async function loadAllSites() {
            try {
                const promises = kirkwoodSites.map(async site => {
                    try {
                        const response = await fetch(site.dataUrl);
                        if (!response.ok) throw new Error('Failed to fetch');
                        const data = await response.json();
                        return { ...site, ...data, loaded: true };
                    } catch (error) {
                        console.error(`Error loading ${site.name}:`, error);
                        return {
                            ...site,
                            loaded: false,
                            status: 'offline',
                            total_kwh: 0,
                            last_updated: 'N/A',
                            today: { hourly_pv: new Array(24).fill(0), irradiation: new Array(24).fill(0) },
                            hourly_pv: new Array(24).fill(0),
                            stats_30day: {}
                        };
                    }
                });

                allSitesData = await Promise.all(promises);
                updateDashboard();
            } catch (error) {
                console.error('Error loading sites:', error);
            }
        }

        function getHourlyPv(site) {
            if (site.today && site.today.hourly_pv) return site.today.hourly_pv;
            return site.hourly_pv || new Array(24).fill(0);
        }

        function updateDashboard() {
            const fleetTotal = allSitesData.reduce((sum, site) => sum + (site.total_kwh || 0), 0);
            const sitesOk = allSitesData.filter(s => s.status === 'ok').length;
            const sitesTotal = allSitesData.length;
            const hasIssues = sitesOk < sitesTotal;

            document.getElementById('fleetTotal').innerHTML = 
                `${fleetTotal.toFixed(1)} <span style="font-size: 1.5rem; color: #9ca3af;">kWh</span>`;
            
            const badge = document.getElementById('statusBadge');
            badge.className = `fleet-status-badge${hasIssues ? ' has-issues' : ''}`;
            document.getElementById('statusCount').textContent = `${sitesOk} OK`;

            const latestUpdate = allSitesData
                .filter(s => s.last_updated)
                .map(s => s.last_updated)
                .sort()
                .reverse()[0] || 'N/A';
            document.getElementById('lastUpdated').textContent = `Updated ${latestUpdate}`;

            const container = document.getElementById('sitesContainer');
            container.innerHTML = '';

            allSitesData.forEach(site => {
                const card = createSiteCard(site);
                container.appendChild(card);
            });

            setTimeout(() => {
                allSitesData.forEach(site => {
                    renderSiteChart(site);
                });
            }, 100);
        }

        function createSiteCard(site) {
            const card = document.createElement('div');
            card.className = `site-card ${site.status}`;
            card.onclick = () => window.open(site.dashboardUrl, '_blank');

            const chartId = `chart-${site.name.replace(/\s+/g, '-').toLowerCase()}`;
            const stats = site.stats_30day || {};
            const dailyAvg = stats.daily_avg || 0;
            const totalKwh = site.total_kwh || 0;
            
            // % of 30-day average
            const pctOfAvg = dailyAvg > 0 ? Math.round((totalKwh / dailyAvg) * 100) : 0;
            const pctClass = pctOfAvg >= 70 ? 'good' : pctOfAvg >= 40 ? 'warn' : 'bad';
            
            // Pace: compare today's hourly total to expected at this hour
            const hourlyPv = getHourlyPv(site);
            const hourlyAvg = stats.hourly_avg || [];
            const lastHour = site.last_hour || 0;
            const expectedByNow = hourlyAvg.slice(0, lastHour + 1).reduce((a, b) => a + b, 0);
            const paceRatio = expectedByNow > 0 ? Math.round((totalKwh / expectedByNow) * 100) : 0;
            const paceClass = paceRatio >= 80 ? 'good' : paceRatio >= 50 ? 'warn' : 'bad';

            // Legend items depend on mode
            const todayLegend = `
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:#22c55e;"></div>PV</div>
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:rgba(202,138,4,0.7);"></div>Irrad</div>
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:rgba(96,165,250,0.6);border-top:1px dashed rgba(96,165,250,0.6);height:0;"></div>Avg</div>
            `;
            const avgLegend = `
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:#22c55e;border-top:1px dashed #22c55e;height:0;"></div>Today</div>
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:#60a5fa;border-top:1px dashed #60a5fa;height:0;"></div>Median</div>
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:rgba(34,197,94,0.3);"></div>P25-75</div>
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:rgba(180,140,60,0.8);"></div>Min</div>
                <div class="mini-legend-item"><div class="mini-legend-swatch" style="background:rgba(150,100,220,0.8);"></div>Max</div>
            `;

            card.innerHTML = `
                <div class="site-info">
                    <div class="site-left">
                        <div class="site-header">
                            <div class="site-name">${site.name}</div>
                            <div class="status-indicator ${site.status}"></div>
                        </div>
                        <div class="site-production">${totalKwh.toFixed(1)} <span style="font-size: 1rem; color: #9ca3af;">kWh</span></div>
                        <div class="site-status ${site.status}">System ${(site.status || 'offline').toUpperCase()}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="site-stat-badge ${pctClass}" title="Today: ${totalKwh.toFixed(1)} kWh | 30-day avg: ${dailyAvg.toFixed(1)} kWh">${pctOfAvg}% of avg</div>
                        <div class="site-stat-badge ${paceClass}" style="margin-top:4px;" title="Generated: ${totalKwh.toFixed(1)} kWh | Expected by now: ${expectedByNow.toFixed(1)} kWh">${paceRatio}% pace</div>
                    </div>
                </div>
                <div class="mini-legend" id="legend-${chartId}">
                    ${currentMiniMode === 'today' ? todayLegend : avgLegend}
                </div>
                <div class="site-chart-wrapper">
                    <div class="site-chart-container">
                        <canvas id="${chartId}"></canvas>
                    </div>
                </div>
            `;

            return card;
        }

        function renderSiteChart(site) {
            const chartId = `chart-${site.name.replace(/\s+/g, '-').toLowerCase()}`;
            const canvas = document.getElementById(chartId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const hours = Array.from({length: 24}, (_, i) => i);
            const hourlyPv = getHourlyPv(site);
            const stats = site.stats_30day || {};
            const irradiation = (site.today && site.today.irradiation) || site.irradiation || new Array(24).fill(0);

            if (siteCharts[chartId]) {
                siteCharts[chartId].destroy();
            }

            let datasets;

            // Helper: truncate at last producing hour
            function truncateAtLastHour(arr) {
                let last = 0;
                for (let i = arr.length - 1; i >= 0; i--) {
                    if (arr[i] > 0) { last = i; break; }
                }
                return arr.map((v, i) => i <= last ? v : null);
            }

            if (currentMiniMode === 'today') {
                datasets = [
                    {
                        type: 'line',
                        label: 'Irradiation',
                        data: irradiation,
                        backgroundColor: 'rgba(133, 77, 14, 0.5)',
                        borderColor: 'rgba(202, 138, 4, 0.7)',
                        borderWidth: 0.5,
                        fill: true,
                        yAxisID: 'y1',
                        pointRadius: 0,
                        tension: 0.4,
                        order: 3
                    },
                    {
                        type: 'line',
                        label: 'Avg',
                        data: stats.hourly_avg || new Array(24).fill(0),
                        borderColor: 'rgba(96, 165, 250, 0.6)',
                        borderWidth: 1,
                        borderDash: [3, 2],
                        fill: false,
                        pointRadius: 0,
                        tension: 0.4,
                        order: 1
                    },
                    {
                        type: 'bar',
                        label: 'Today',
                        data: hourlyPv,
                        backgroundColor: '#22c55e',
                        borderWidth: 0,
                        barPercentage: 0.8,
                        categoryPercentage: 0.9,
                        order: 2
                    }
                ];
            } else {
                // 30-Day Average: Min/Max + P25-P75 band + Median (blue) + Today Actual (green)
                datasets = [
                    {
                        type: 'line',
                        label: 'Min',
                        data: stats.hourly_min || new Array(24).fill(0),
                        backgroundColor: 'rgba(120, 80, 40, 0.10)',
                        borderColor: 'rgba(180, 140, 60, 0.7)',
                        borderWidth: 1,
                        fill: '+1',
                        pointRadius: 0,
                        tension: 0.4,
                        order: 6
                    },
                    {
                        type: 'line',
                        label: 'Max',
                        data: stats.hourly_max || new Array(24).fill(0),
                        backgroundColor: 'transparent',
                        borderColor: 'rgba(150, 100, 220, 0.7)',
                        borderWidth: 1,
                        pointRadius: 0,
                        tension: 0.4,
                        order: 6
                    },
                    {
                        type: 'line',
                        label: 'P25-P75',
                        data: stats.hourly_p25 || new Array(24).fill(0),
                        backgroundColor: 'rgba(34, 197, 94, 0.18)',
                        borderColor: 'rgba(34, 197, 94, 0.4)',
                        borderWidth: 0.5,
                        fill: '+1',
                        pointRadius: 0,
                        tension: 0.4,
                        order: 4
                    },
                    {
                        type: 'line',
                        label: '',
                        data: stats.hourly_p75 || new Array(24).fill(0),
                        backgroundColor: 'transparent',
                        borderColor: 'rgba(34, 197, 94, 0.4)',
                        borderWidth: 0.5,
                        pointRadius: 0,
                        tension: 0.4,
                        order: 4
                    },
                    {
                        type: 'line',
                        label: 'Median',
                        data: stats.hourly_avg || new Array(24).fill(0),
                        borderColor: '#60a5fa',
                        borderWidth: 1.5,
                        borderDash: [4, 3],
                        fill: false,
                        pointRadius: 0,
                        tension: 0.4,
                        order: 2
                    },
                    {
                        type: 'line',
                        label: 'Today',
                        data: truncateAtLastHour(hourlyPv),
                        borderColor: '#22c55e',
                        borderWidth: 1.5,
                        borderDash: [4, 2],
                        fill: false,
                        pointRadius: 0,
                        tension: 0.4,
                        order: 1
                    }
                ];
            }

            siteCharts[chartId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(148, 163, 184, 0.08)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#4b5563',
                                font: { size: 9 },
                                maxTicksLimit: 6
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(148, 163, 184, 0.08)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#4b5563',
                                font: { size: 9 },
                                maxTicksLimit: 4
                            }
                        },
                        ...(currentMiniMode === 'today' ? {
                            y1: {
                                beginAtZero: true,
                                position: 'right',
                                display: false,
                                grid: { drawOnChartArea: false }
                            }
                        } : {})
                    }
                }
            });
        }

        function switchMiniMode(mode, btn) {
            currentMiniMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Rebuild cards (legends change between modes) and re-render charts
            const container = document.getElementById('sitesContainer');
            container.innerHTML = '';
            allSitesData.forEach(site => {
                container.appendChild(createSiteCard(site));
            });
            setTimeout(() => {
                allSitesData.forEach(site => renderSiteChart(site));
            }, 100);
        }
    </script>
</body>
</html>

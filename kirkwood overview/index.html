<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirkwood Sites - PV Status Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .last-updated {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .fleet-summary {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .fleet-title {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .fleet-total {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fleet-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .fleet-metric {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fleet-metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .fleet-metric-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .status-ok { color: #22c55e; }
        .status-low { color: #fb923c; }
        .status-offline { color: #ef4444; }

        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .site-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .site-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .site-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: currentColor;
        }

        .site-card.ok::before { background: #22c55e; }
        .site-card.low::before { background: #fb923c; }
        .site-card.offline::before { background: #ef4444; }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .site-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .status-indicator.ok { background: #22c55e; color: #22c55e; }
        .status-indicator.low { background: #fb923c; color: #fb923c; }
        .status-indicator.offline { background: #ef4444; color: #ef4444; }

        .site-production {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .site-label {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .site-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .site-stat {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 8px;
        }

        .site-stat-value {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .site-stat-label {
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .fleet-total {
                font-size: 3.5rem;
            }
            .sites-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kirkwood Sites - PV Status Dashboard</h1>
            <div class="last-updated" id="lastUpdated">Updated: Loading...</div>
        </div>

        <div class="fleet-summary">
            <div class="fleet-title">Fleet Status</div>
            <div class="fleet-total" id="fleetTotal">0.0 <span style="font-size: 2.5rem; color: #94a3b8;">kWh</span></div>
            <div class="fleet-metrics">
                <div class="fleet-metric">
                    <div class="fleet-metric-value status-ok" id="sitesOk">0</div>
                    <div class="fleet-metric-label">Sites OK</div>
                </div>
                <div class="fleet-metric">
                    <div class="fleet-metric-value status-low" id="sitesLow">0</div>
                    <div class="fleet-metric-label">Sites Low</div>
                </div>
                <div class="fleet-metric">
                    <div class="fleet-metric-value status-offline" id="sitesOffline">0</div>
                    <div class="fleet-metric-label">Sites Offline</div>
                </div>
                <div class="fleet-metric">
                    <div class="fleet-metric-value" id="totalSites">0</div>
                    <div class="fleet-metric-label">Total Sites</div>
                </div>
            </div>
        </div>

        <div id="sitesContainer" class="sites-grid">
            <div class="loading">Loading site data...</div>
        </div>

        <button class="refresh-btn" onclick="loadAllSites()">🔄 Refresh</button>
    </div>

    <script>
        // Define all Kirkwood sites
        const kirkwoodSites = [
            {
                name: "Addo Spar",
                dataUrl: "../addo-spar/data/processed.json",
                dashboardUrl: "../addo-spar/"
            },
            {
                name: "Kirkwood Spar",
                dataUrl: "../kirkwood-spar/data/processed.json",
                dashboardUrl: "../kirkwood-spar/"
            },
            {
                name: "Kirkwood FNB",
                dataUrl: "../kirkwood-fnb/data/processed.json",
                dashboardUrl: "../kirkwood-fnb/"
            },
            {
                name: "Kirkwood Tops",
                dataUrl: "../kirkwood-tops/data/processed.json",
                dashboardUrl: "../kirkwood-tops/"
            }
        ];

        let allSitesData = [];

        // Load all sites on page load
        loadAllSites();
        
        // Auto-refresh every hour
        setInterval(loadAllSites, 3600000);

        async function loadAllSites() {
            try {
                // Fetch all sites in parallel
                const promises = kirkwoodSites.map(async site => {
                    try {
                        const response = await fetch(site.dataUrl);
                        if (!response.ok) throw new Error('Failed to fetch');
                        const data = await response.json();
                        return {
                            ...site,
                            ...data,
                            loaded: true
                        };
                    } catch (error) {
                        console.error(`Error loading ${site.name}:`, error);
                        return {
                            ...site,
                            loaded: false,
                            status: 'offline',
                            total_kwh: 0,
                            last_updated: 'N/A'
                        };
                    }
                });

                allSitesData = await Promise.all(promises);
                updateDashboard();
            } catch (error) {
                console.error('Error loading sites:', error);
            }
        }

        function updateDashboard() {
            // Calculate fleet totals
            const fleetTotal = allSitesData.reduce((sum, site) => sum + (site.total_kwh || 0), 0);
            const sitesOk = allSitesData.filter(s => s.status === 'ok').length;
            const sitesLow = allSitesData.filter(s => s.status === 'low').length;
            const sitesOffline = allSitesData.filter(s => s.status === 'offline').length;

            // Update fleet summary
            document.getElementById('fleetTotal').innerHTML = 
                `${fleetTotal.toFixed(1)} <span style="font-size: 2.5rem; color: #94a3b8;">kWh</span>`;
            document.getElementById('sitesOk').textContent = sitesOk;
            document.getElementById('sitesLow').textContent = sitesLow;
            document.getElementById('sitesOffline').textContent = sitesOffline;
            document.getElementById('totalSites').textContent = allSitesData.length;

            // Update last updated time
            const latestUpdate = allSitesData
                .filter(s => s.last_updated)
                .map(s => s.last_updated)
                .sort()
                .reverse()[0] || 'N/A';
            document.getElementById('lastUpdated').textContent = `Updated: ${latestUpdate}`;

            // Render site cards
            const container = document.getElementById('sitesContainer');
            container.innerHTML = '';

            allSitesData
                .sort((a, b) => {
                    // Sort: OK first, then Low, then Offline
                    const order = { ok: 0, low: 1, offline: 2 };
                    return order[a.status] - order[b.status];
                })
                .forEach(site => {
                    const card = createSiteCard(site);
                    container.appendChild(card);
                });
        }

        function createSiteCard(site) {
            const card = document.createElement('div');
            card.className = `site-card ${site.status}`;
            card.onclick = () => window.open(site.dashboardUrl, '_blank');

            const stats = site.stats_30day || {};
            const percentOfAvg = stats.daily_avg > 0 ? 
                ((site.total_kwh / stats.daily_avg) * 100).toFixed(0) : 0;

            card.innerHTML = `
                <div class="site-header">
                    <div class="site-name">${site.name}</div>
                    <div class="status-indicator ${site.status}"></div>
                </div>
                <div class="site-production">${(site.total_kwh || 0).toFixed(1)} <span style="font-size: 1.5rem; color: #94a3b8;">kWh</span></div>
                <div class="site-label">Total Generation Today</div>
                <div class="site-stats">
                    <div class="site-stat">
                        <div class="site-stat-value">${site.last_hour || '--'}:00</div>
                        <div class="site-stat-label">Last Hour</div>
                    </div>
                    <div class="site-stat">
                        <div class="site-stat-value">${percentOfAvg}%</div>
                        <div class="site-stat-label">% of Avg</div>
                    </div>
                    <div class="site-stat">
                        <div class="site-stat-value">${stats.daily_avg || '--'} kWh</div>
                        <div class="site-stat-label">30-Day Avg</div>
                    </div>
                    <div class="site-stat">
                        <div class="site-stat-value status-${site.status}">${site.status.toUpperCase()}</div>
                        <div class="site-stat-label">Status</div>
                    </div>
                </div>
            `;

            return card;
        }
    </script>
</body>
</html>
